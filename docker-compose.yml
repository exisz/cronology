services:
  cronology:
    build: .
    container_name: cronology
    restart: unless-stopped
    ports:
      - "18790:18790"
    volumes:
      - cronology-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=18790
      - CRONOLOGY_DATA_DIR=/app/data
      # Optional: webhook callback defaults
      # - OPENCLAW_HOOK_URL=http://localhost:18789/hooks/agent
      # - OPENCLAW_HOOK_TOKEN=your-token-here
      # - OPENCLAW_HOOK_CHANNEL=discord
      # - OPENCLAW_HOOK_TO=channel:your-channel-id

volumes:
  cronology-data:
